## compose-litellm-ecs.yaml
## ECS (Fargate) deployment of the LiteLLM proxy stack.
##
## KEY DIFFERENCES FROM THE PODMAN COMPOSE (compose-litellm.yaml):
##   1. No firewalld/harden-egress.sh — egress is locked down via Security Groups.
##   2. No IMDS hop-limit gymnastics — ECS Task Roles provide scoped, short-lived
##      credentials via the task metadata endpoint (169.254.170.2).
##   3. No Podman bridge network — ECS tasks run in your VPC subnets.
##   4. No local bind-mount volumes — use EFS for persistent Postgres data.
##   5. Secrets come from AWS Secrets Manager or SSM Parameter Store, not .env files.
##   6. TLS is handled by an Application Load Balancer (ALB) — the nginx container
##      is optional and only needed if you want end-to-end mTLS or a specific
##      nginx feature the ALB doesn't cover.
##
## USAGE (Docker Compose with ECS context):
##   docker compose --file compose-litellm-ecs.yaml --profile ecs up
##   — or —
##   ecs-cli compose --file compose-litellm-ecs.yaml up
##
## PREREQUISITES (beyond the Podman setup):
##   - VPC with at least 2 subnets across distinct AZs
##   - Security groups (created by ecs-security-groups.yaml or manually)
##   - ECS Cluster (Fargate)
##   - ALB with listener rules for ports 80/443
##   - EFS filesystem for Postgres persistence
##   - Secrets Manager secrets: litellm/postgres-password, litellm/master-key
##   - ECS Task Execution Role (pulls images, reads secrets)
##   - ECS Task Role (Bedrock InvokeModel, no IMDS needed)

version: "3.8"

# ---------------------------------------------------------------------------
# Shared configuration
# ---------------------------------------------------------------------------

x-ecs-common: &ecs-common
  platform: linux/amd64
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging:
    driver: awslogs
    options:
      awslogs-region: ${AWS_REGION:-us-east-1}
      awslogs-group: /ecs/litellm
      awslogs-stream-prefix: ecs

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------

services:

  # ---- PostgreSQL --------------------------------------------------------
  litellm-db:
    <<: *ecs-common
    image: postgres:18@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
    container_name: litellm-db
    user: "999:999"
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: proxy_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - litellm-pgdata:/var/lib/postgresql
    tmpfs:
      - /var/run/postgresql:mode=0777
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy_admin -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpu: "0.5"
          memory: 512M
        reservations:
          cpu: "0.25"
          memory: 256M
    # ECS networking — tasks get ENIs in your VPC subnets
    networks:
      - litellm-ecs-net
    # Egress: Postgres should NOT need outbound — locked down at SG level
    # but the task definition's SG should allow egress to RDS if migrating
    # to Amazon RDS instead of self-managed Postgres.

  # ---- LiteLLM Proxy ----------------------------------------------------
  litellm-proxy:
    <<: *ecs-common
    image: ghcr.io/berriai/litellm:v1.92.0@sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
    container_name: litellm-proxy
    build:
      context: ./litellm_service
      dockerfile: Dockerfile
    environment:
      # Database URL — in production, replace with an RDS endpoint
      DATABASE_URL: postgresql://proxy_admin:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # ECS Task Role replaces IMDS — boto3 picks up credentials from
      # AWS_CONTAINER_CREDENTIALS_FULL_URI automatically inside ECS.
      # NO IMDS hop-limit, NO host network, NO static keys.
    depends_on:
      litellm-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpu: "1.0"
          memory: 1024M
        reservations:
          cpu: "0.5"
          memory: 512M
      # Service-level ECS config — used by docker compose --profile ecs
      # These keys are ignored by podman-compose but drive ECS task definition
      # generation when using the Docker Compose ECS integration.
      labels:
        ecs.task_definition: litellm-proxy
        ecs.cluster: ${ECS_CLUSTER:-litellm-cluster}
        ecs.subnets: ${ECS_SUBNETS:-subnet-placeholder}
        ecs.security_groups: ${ECS_SG_IDS:-sg-placeholder}
        ecs.assign_public_ip: "DISABLED"   # tasks run in private subnets
        ecs.task_role_arn: ${ECS_TASK_ROLE_ARN:-arn:aws:iam::ACCOUNT:role/ecsTaskRole}
        ecs.execution_role_arn: ${ECS_EXECUTION_ROLE_ARN:-arn:aws:iam::ACCOUNT:role/ecsTaskExecutionRole}
        ecs.enable_execute_command: "true"  # allow `aws ecs execute-command`
    networks:
      - litellm-ecs-net
    # Egress is locked to Bedrock via the litellm-proxy Security Group:
    #   Outbound TCP 443 → Bedrock VPC endpoint (preferred) or
    #                       Bedrock public IP ranges (reviewed periodically)
    #   Outbound UDP/TCP 53 → VPC DNS (169.0.0.2 or VPC+2)
    #   All other egress → REJECT
    # This replaces harden-egress.sh entirely.

  # ---- Nginx (OPTIONAL — use ALB for TLS in ECS) ------------------------
  # Commented out by default. In ECS, the ALB terminates TLS. Uncomment only
  # if you need a sidecar for custom header injection or mTLS.

  # litellm-nginx:
  #   <<: *ecs-common
  #   image: nginx:alpine@sha256:7068961d45b07b2af510ac002e9daa63a1d3eba2111202d6768798690800fffd
  #   container_name: litellm-nginx
  #   build:
  #     context: ./nginx_service
  #     dockerfile: Dockerfile
  #   environment:
  #     PROXY_IP: 127.0.0.1   # ALB connects to the task on the target port
  #   volumes:
  #     - litellm-nginx-certs:/etc/nginx/certs:z
  #   deploy:
  #     resources:
  #       limits:
  #         cpu: "0.25"
  #         memory: 256M
  #       reservations:
  #         cpu: "0.1"
  #         memory: 128M
  #   networks:
  #     - litellm-ecs-net

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------

networks:
  litellm-ecs-net:
    # In ECS, the network is your VPC. This definition exists so compose
    # can resolve inter-service DNS. The actual VPC/subnet configuration
    # is in the ECS task definition (via the labels on litellm-proxy).
    driver: bridge
    name: litellm-ecs-net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------

volumes:
  litellm-pgdata:
    driver: local
    # In production, replace with an EFS-backed volume or migrate to Amazon RDS.
    # EFS example (via docker volume plugin or ECS EFS integration):
    #   driver: local
    #   driver_opts:
    #     type: nfs
    #     device: fs-xxxxxxxx.efs.us-east-1.amazonaws.com:/
    #     o: addr=fs-xxxxxxxx.efs.us-east-1.amazonaws.com,rsize=1048576,wsize=1048576,timeo=600,retrans=2,noresvport

  # litellm-nginx-certs:
  #   driver: local

model_list:

  # Claude Sonnet 5 — near-Opus intelligence, primary coding model
  - model_name: claude-sonnet-5
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-5
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  # Claude Opus 4.8 — most capable, primary reasoning model
  - model_name: claude-opus-4-8
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-8
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  # Claude Sonnet 4.6 — balanced speed/capability, primary coding model
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  # Claude Haiku 4.5 — fast/budget model
  - model_name: claude-haiku-4-5
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  # Legacy aliases — backwards-compat with existing client configs
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  - model_name: claude-3-5-sonnet-v2
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  - model_name: claude-3-5-haiku
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

  # IDE extension fallback alias
  - model_name: anthropic.claude-3-5-sonnet
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
      cache_control_injection_points:
        - location: "user"
        - location: "system"

router_settings:
  routing_strategy: simple-shuffle

litellm_settings:
  drop_params: true
  drop_headers: ["anthropic-beta"]

services:
  # OPTIONAL when using Amazon RDS instead of a local Postgres container
  # (see rds-postgres.yaml and the "Optional: Amazon RDS" section in
  # README.md):
  #   1. Comment out this entire litellm-db service block.
  #   2. Remove the `depends_on: litellm-db: condition: service_healthy`
  #      block from litellm-proxy below.
  #   3. Set DATABASE_URL in .env to the RDS endpoint (see rds-postgres.yaml
  #      Outputs) with ?sslmode=require, then re-run gen-env.sh (preserves it
  #      across regeneration, same as POSTGRES_PASSWORD/LITELLM_MASTER_KEY).
  # RDS lives on its own VPC ENI, NOT on internal_net — isolation comes from
  # the RDS security group + PubliclyAccessible:false, not bridge membership.
  litellm-db:
    image: docker.io/library/postgres:18@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
    container_name: litellm-db
    user: "999:999"
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: proxy_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${VOLUMES}/litellm_pgvol/data:/var/lib/postgresql
    tmpfs:
      - /var/run/postgresql:mode=0777
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy_admin -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal_net

  litellm-proxy:
    container_name: litellm-proxy
    build:
      context: ./litellm_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      litellm-db:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal_net

  litellm-nginx:
    container_name: litellm-nginx
    build:
      context: ./nginx_service
      dockerfile: Dockerfile
    volumes:
      - ./nginx_certs:/etc/nginx/certs:z
    restart: unless-stopped
    environment:
      PROXY_IP: ${HOST_IP}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - litellm-proxy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - internal_net

networks:
  internal_net:
    external: true
    name: internal_net
